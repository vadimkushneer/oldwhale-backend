openapi: 3.0.3
info:
  title: Old Whale API
  description: |
    HTTP JSON API for Old Whale: registration, login (JWT), current user, and admin user management.

    **Storage:** PostgreSQL only; the server requires a configured **`DATABASE_URL`** (no embedded SQLite).

    **Authentication:** Send `Authorization: Bearer <token>` for protected routes. Admin routes require a JWT whose payload includes `role: "admin"`.

    **CORS:** When `CORS_ORIGIN` is unset, responses use `Access-Control-Allow-Origin: *`. Preflight `OPTIONS` returns **204** with CORS headers for allowed methods.
  version: 1.0.0

servers:
  - url: /
    description: Default (same host as this service)

tags:
  - name: Health
    description: Liveness and database connectivity
  - name: Auth
    description: Registration and login (no JWT required)
  - name: Me
    description: Current authenticated user
  - name: Admin
    description: User administration (JWT with admin role)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns OK when the database connection pool answers `Ping()`. Does not require authentication.
      operationId: getHealth
      responses:
        "200":
          description: Service and database are reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOK"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a user with role `user` and returns a JWT plus public user fields.
      operationId: postAuthRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid JSON, invalid fields (login length, password length, email), or validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Login or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Password hashing or token error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticates by login name and password; returns a JWT and public user fields.
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Token error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/me:
    get:
      tags: [Me]
      summary: Current user
      description: Returns the authenticated user's public profile. Requires a valid Bearer JWT.
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing or invalid token, user not found, or account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List all users
      description: Requires Bearer JWT with **admin** role.
      operationId: getAdminUsers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Admin]
      summary: Create a user (admin)
      description: |
        Requires Bearer JWT with **admin** role. Password minimum length is **4** (intended for test accounts). Unknown `role` values default to `user`.
      operationId: postAdminUsers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapResponse"
        "400":
          description: Invalid JSON or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Login or email taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Hash or database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Numeric user id
        schema:
          type: integer
          format: int64
          minimum: 1
    patch:
      tags: [Admin]
      summary: Update a user (admin)
      description: |
        Requires Bearer JWT with **admin** role. At least one of `disabled` or `role` should be sent; empty `role` string is ignored.
      operationId: patchAdminUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapResponse"
        "400":
          description: Bad path id, invalid JSON, or invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User id not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Admin]
      summary: Delete a user (admin)
      description: Requires Bearer JWT with **admin** role. Cannot delete your own account.
      operationId: deleteAdminUser
      security:
        - BearerAuth: []
      responses:
        "204":
          description: User deleted (no response body)
        "400":
          description: Bad path id, or cannot delete self
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT returned by `/api/auth/login` or `/api/auth/register`.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message

    HealthOK:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    User:
      type: object
      required: [id, login, email, role, disabled, created_at]
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        disabled:
          type: boolean
        created_at:
          type: string
          format: date-time
          description: RFC3339 timestamp

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string

    RegisterRequest:
      type: object
      required: [login, email, password]
      properties:
        login:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    AdminCreateUserRequest:
      type: object
      required: [login, email, password]
      properties:
        login:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 4
        role:
          type: string
          enum: [user, admin]
          default: user

    PatchUserRequest:
      type: object
      description: At least one field is typically sent.
      properties:
        disabled:
          type: boolean
        role:
          type: string
          enum: [user, admin]

    AuthTokenResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT string
        user:
          $ref: "#/components/schemas/User"

    UserWrapResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    UserListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
