openapi: 3.0.3
info:
  title: Old Whale API
  description: |
    HTTP JSON API for Old Whale: registration, login (JWT), current user, and admin user management.

    **Storage:** PostgreSQL only; the server requires a configured **`DATABASE_URL`** (no embedded SQLite).

    **Authentication:** Send `Authorization: Bearer <token>` for protected routes. Admin routes require a JWT whose payload includes `role: "admin"`.

    **JWT payload (HS256):** Claims include `uid` (int64 user id), `role` (`user` or `admin`), plus standard `iat` / `exp`. Default token lifetime is **72 hours** unless the server is configured otherwise.

    **Discovery:** Same spec is served as **`GET /openapi.yaml`** (YAML) and **`GET /openapi.json`** (JSON). Interactive docs: **`GET /swagger`** (Swagger UI).

    **CORS:** When `CORS_ORIGIN` is unset, responses use `Access-Control-Allow-Origin: *`. Preflight `OPTIONS` returns **204** with CORS headers for allowed methods (`GET`, `POST`, `PUT`, `PATCH`, `DELETE`). Allowed request header: `Authorization`, `Content-Type`.
  version: 1.0.0

servers:
  - url: /
    description: Default (same host as this service)

tags:
  - name: Health
    description: Liveness and database connectivity
  - name: Auth
    description: Registration and login (no JWT required)
  - name: Me
    description: Current authenticated user
  - name: Admin
    description: User administration (JWT with admin role)
  - name: AiModels
    description: AI provider groups and model variants (public catalog + admin CRUD)

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns OK when the database connection pool answers `Ping()`. Does not require authentication.
      operationId: getHealth
      responses:
        "200":
          description: Service and database are reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthOK"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      description: Creates a user with role `user` and returns a JWT plus public user fields.
      operationId: postAuthRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid JSON, invalid fields (login length, password length, email), or validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Login or email already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Password hashing or token error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: Authenticates by login name and password; returns a JWT and public user fields.
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenResponse"
        "400":
          description: Invalid JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Token error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/me:
    get:
      tags: [Me]
      summary: Current user
      description: Returns the authenticated user's public profile. Requires a valid Bearer JWT.
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing or invalid token, user not found, or account disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ai/models:
    get:
      tags: [AiModels]
      summary: Public AI model catalog
      description: No authentication. Groups and variants ordered by `position`.
      operationId: getPublicAIModels
      responses:
        "200":
          description: Catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCatalogPublicResponse"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/ai/chat:
    post:
      tags: [AiModels]
      summary: Chat stub (fixed reply)
      description: |
        Public endpoint. Sends user message and selected catalog slugs; currently returns a constant reply (no LLM).
        Optional `Authorization: Bearer` (valid JWT) associates the request with a user for server-side audit logging.
      operationId: postAiChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiChatRequest"
      responses:
        "200":
          description: Assistant reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatResponse"
        "400":
          description: Invalid JSON or missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/ai/chat-logs:
    get:
      tags: [AiModels]
      summary: List AI chat audit logs (admin)
      description: |
        Paginated list of stored `/api/ai/chat` exchanges. Query params filter by column (AND-combined substring filters use `ILIKE`).
        Dates must be RFC3339 (`from`, `to`).
      operationId: getAdminAIChatLogs
      security:
        - BearerAuth: []
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0, default: 0 }
        - name: id
          in: query
          schema: { type: integer, format: int64 }
        - name: from
          in: query
          schema: { type: string, format: date-time }
          description: Inclusive lower bound (RFC3339).
        - name: to
          in: query
          schema: { type: string, format: date-time }
          description: Inclusive upper bound (RFC3339).
        - name: user_id
          in: query
          schema: { type: integer, format: int64 }
        - name: group_slug
          in: query
          schema: { type: string }
        - name: variant_slug
          in: query
          schema: { type: string }
        - name: message_contains
          in: query
          schema: { type: string }
        - name: reply_contains
          in: query
          schema: { type: string }
        - name: user_message_id
          in: query
          schema: { type: string }
        - name: assistant_message_id
          in: query
          schema: { type: string }
        - name: client_ip
          in: query
          schema: { type: string }
        - name: user_agent
          in: query
          schema: { type: string }
        - name: login_contains
          in: query
          schema: { type: string }
        - name: email_contains
          in: query
          schema: { type: string }
        - name: editor_mode
          in: query
          schema:
            type: string
            enum: [note, media, short, play, film]
          description: Exact match on stored editor mode (omit for all).
      responses:
        "200":
          description: Paginated chat logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiChatLogListResponse"
        "400": { description: Bad filter value, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "405": { description: Method not allowed, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Database error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/admin/me/ui-settings:
    get:
      tags: [AiModels]
      summary: Admin UI preferences (current user)
      description: Persisted JSON for the authenticated admin (e.g. AI chat log table column visibility).
      operationId: getAdminMeUiSettings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUiSettingsResponse"
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "405": { description: Method not allowed, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Database error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    put:
      tags: [AiModels]
      summary: Update admin UI preferences
      description: Merges `aiChatLogTable.columns` into stored preferences.
      operationId: putAdminMeUiSettings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUiSettingsPutRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUiSettingsResponse"
        "400": { description: Invalid body, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "405": { description: Method not allowed, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Database error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/admin/ai/groups:
    get:
      tags: [AiModels]
      summary: List AI groups (admin, nested variants)
      description: Requires Bearer JWT with **admin** role.
      operationId: getAdminAIGroups
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Groups with variants
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiGroupListAdminResponse"
        "401": { description: Missing or invalid Bearer token, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Not an admin, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "405": { description: Method not allowed, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Database error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    post:
      tags: [AiModels]
      summary: Create AI group
      description: Requires admin JWT.
      operationId: postAdminAIGroup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGroupCreateRequest"
      responses:
        "200":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiGroupWrapResponse"
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "409": { description: Slug conflict, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Server error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/admin/ai/groups/order:
    put:
      tags: [AiModels]
      summary: Reorder AI groups
      description: Body `{ "ids": [1,2,3] }` sets positions 0..n-1 in that order.
      operationId: putAdminAIGroupsOrder
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiReorderRequest"
      responses:
        "204": { description: Success, no body }
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Server error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/admin/ai/groups/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
    patch:
      tags: [AiModels]
      summary: Update AI group
      operationId: patchAdminAIGroup
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiGroupPatchRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiGroupWrapResponse"
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "409": { description: Slug conflict, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Server error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    delete:
      tags: [AiModels]
      summary: Delete AI group (cascade variants)
      operationId: deleteAdminAIGroup
      security:
        - BearerAuth: []
      responses:
        "204": { description: Deleted }
        "400": { description: Bad id, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Server error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/admin/ai/groups/{groupId}/variants:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
    post:
      tags: [AiModels]
      summary: Create variant under group
      operationId: postAdminAIVariant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiVariantCreateRequest"
      responses:
        "200":
          description: Created variant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiVariantWrapResponse"
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: Group not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "409": { description: Slug conflict, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Server error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/admin/ai/groups/{groupId}/variants/order:
    parameters:
      - name: groupId
        in: path
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
    put:
      tags: [AiModels]
      summary: Reorder variants in group
      operationId: putAdminAIVariantsOrder
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiReorderRequest"
      responses:
        "204": { description: Success }
        "400": { description: Invalid reorder, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Server error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/admin/ai/variants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
    patch:
      tags: [AiModels]
      summary: Update variant
      operationId: patchAdminAIVariant
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiVariantPatchRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiVariantWrapResponse"
        "400": { description: Bad request, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "409": { description: Slug conflict, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Server error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    delete:
      tags: [AiModels]
      summary: Delete variant
      operationId: deleteAdminAIVariant
      security:
        - BearerAuth: []
      responses:
        "204": { description: Deleted }
        "400": { description: Bad id, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "401": { description: Unauthorized, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: Forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: Not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "500": { description: Server error, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /api/admin/users:
    get:
      tags: [Admin]
      summary: List all users
      description: Requires Bearer JWT with **admin** role.
      operationId: getAdminUsers
      security:
        - BearerAuth: []
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated but not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    post:
      tags: [Admin]
      summary: Create a user (admin)
      description: |
        Requires Bearer JWT with **admin** role. Password minimum length is **4** (intended for test accounts). Unknown `role` values default to `user`.
      operationId: postAdminUsers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminCreateUserRequest"
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapResponse"
        "400":
          description: Invalid JSON or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Login or email taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Hash or database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/admin/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Numeric user id
        schema:
          type: integer
          format: int64
          minimum: 1
    patch:
      tags: [Admin]
      summary: Update a user (admin)
      description: |
        Requires Bearer JWT with **admin** role. At least one of `disabled` or `role` should be sent; empty `role` string is ignored.
      operationId: patchAdminUser
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWrapResponse"
        "400":
          description: Bad path id, invalid JSON, or invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User id not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    delete:
      tags: [Admin]
      summary: Delete a user (admin)
      description: |
        Requires Bearer JWT with **admin** role. Cannot delete your own account.

        **Note:** The implementation returns **204** with an empty body when the SQL `DELETE` succeeds, including when no row matched the id (no separate **404**).
      operationId: deleteAdminUser
      security:
        - BearerAuth: []
      responses:
        "204":
          description: User deleted (no response body)
        "400":
          description: Bad path id, or cannot delete self
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Not an admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "405":
          description: Method not allowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Database error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT returned by `POST /api/auth/login` or `POST /api/auth/register` (HS256).
        Payload includes `uid` (user id), `role`, and registered `iat` / `exp` claims.

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message

    HealthOK:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok

    User:
      type: object
      required: [id, login, email, role, disabled, created_at]
      properties:
        id:
          type: integer
          format: int64
        login:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [user, admin]
        disabled:
          type: boolean
        created_at:
          type: string
          format: date-time
          description: RFC3339 timestamp

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
        password:
          type: string

    RegisterRequest:
      type: object
      required: [login, email, password]
      properties:
        login:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    AdminCreateUserRequest:
      type: object
      required: [login, email, password]
      properties:
        login:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 4
        role:
          type: string
          enum: [user, admin]
          default: user

    PatchUserRequest:
      type: object
      description: At least one field is typically sent.
      properties:
        disabled:
          type: boolean
        role:
          type: string
          enum: [user, admin]

    AuthTokenResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT string
        user:
          $ref: "#/components/schemas/User"

    UserWrapResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    UserListResponse:
      type: object
      required: [users]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"

    AiVariantPublic:
      type: object
      required: [id, slug, label, is_default]
      properties:
        id: { type: integer, format: int64 }
        slug: { type: string }
        label: { type: string }
        is_default: { type: boolean }

    AiGroupPublic:
      type: object
      required: [id, slug, label, role, color, free, variants]
      properties:
        id: { type: integer, format: int64 }
        slug: { type: string }
        label: { type: string }
        role: { type: string }
        color: { type: string }
        free: { type: boolean }
        variants:
          type: array
          items:
            $ref: "#/components/schemas/AiVariantPublic"

    AiCatalogPublicResponse:
      type: object
      required: [groups]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/AiGroupPublic"

    AiChatConversationMessage:
      type: object
      required: [id, role, text]
      properties:
        id: { type: string }
        role:
          type: string
          enum: [user, ai, sys]
        text: { type: string }
        model: { type: string }
        modelVariant: { type: string }

    AiChatNoteContextRequest:
      type: object
      description: Required when editorMode is `note`; prior thread before the outgoing `message` turn.
      required: [conversationHistory, workfieldHtml]
      properties:
        conversationHistory:
          type: array
          items:
            $ref: "#/components/schemas/AiChatConversationMessage"
        workfieldHtml:
          type: string
          description: HTML from the note work area (contentEditable).

    AiChatRequest:
      type: object
      required: [message, groupSlug, variantSlug]
      properties:
        message:
          type: string
          description: Full outgoing user content (instructions, text, inlined attachments).
        groupSlug:
          type: string
          description: Selected AI group slug from the public catalog (e.g. deepseek).
        variantSlug:
          type: string
          description: Selected variant slug within that group.
        editorMode:
          type: string
          enum: [note, media, short, play, film]
          description: Active editor surface when the message was sent; server defaults to `film` if omitted.
        noteContext:
          $ref: "#/components/schemas/AiChatNoteContextRequest"

    AiChatResponse:
      type: object
      required: [reply, userMessageId, assistantMessageId]
      properties:
        reply:
          type: string
          description: Assistant message text.
        userMessageId:
          type: string
          format: uuid
          description: Server-issued id for the user turn (UUID v4).
        assistantMessageId:
          type: string
          format: uuid
          description: Server-issued id for the assistant reply (UUID v4).

    AiChatLogUser:
      type: object
      description: User row from join when the log has a `user_id`.
      required: [id, login, email]
      properties:
        id: { type: integer, format: int64 }
        login: { type: string }
        email: { type: string }

    AiChatLogItem:
      type: object
      required:
        - id
        - created_at
        - message
        - group_slug
        - variant_slug
        - reply
        - user_message_id
        - assistant_message_id
      properties:
        id: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        user_id: { type: integer, format: int64, nullable: true }
        message: { type: string }
        group_slug: { type: string }
        variant_slug: { type: string }
        reply: { type: string }
        user_message_id: { type: string }
        assistant_message_id: { type: string }
        client_ip: { type: string, nullable: true }
        user_agent: { type: string, nullable: true }
        user:
          oneOf:
            - $ref: "#/components/schemas/AiChatLogUser"
            - type: "null"
        editor_mode:
          type: string
          nullable: true
          description: Stored editor mode; null for legacy rows.
        note_context:
          description: JSON snapshot for note mode requests; null if not applicable.
          nullable: true
          type: object
          additionalProperties: true

    AiChatLogColumnKey:
      type: string
      enum:
        - id
        - time
        - user
        - message
        - reply
        - model
        - message_ids
        - ip_ua
        - editor_mode
        - note_context

    AiChatLogTableSettings:
      type: object
      description: Column visibility for the admin AI chat log table.
      required: [columns]
      properties:
        columns:
          type: object
          additionalProperties:
            type: boolean
        updated_at:
          type: string
          format: date-time
          nullable: true

    AdminUiSettingsResponse:
      type: object
      required: [aiChatLogTable]
      properties:
        aiChatLogTable:
          $ref: "#/components/schemas/AiChatLogTableSettings"

    AdminUiSettingsPutRequest:
      type: object
      required: [aiChatLogTable]
      properties:
        aiChatLogTable:
          type: object
          required: [columns]
          properties:
            columns:
              type: object
              additionalProperties:
                type: boolean

    AiChatLogListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AiChatLogItem"
        total:
          type: integer
          minimum: 0

    AiVariantAdmin:
      type: object
      required: [id, group_id, slug, label, is_default, position, created_at]
      properties:
        id: { type: integer, format: int64 }
        group_id: { type: integer, format: int64 }
        slug: { type: string }
        label: { type: string }
        is_default: { type: boolean }
        position: { type: integer }
        created_at: { type: string, format: date-time }

    AiGroupAdmin:
      type: object
      required: [id, slug, label, role, color, free, position, created_at, variants]
      properties:
        id: { type: integer, format: int64 }
        slug: { type: string }
        label: { type: string }
        role: { type: string }
        color: { type: string }
        free: { type: boolean }
        position: { type: integer }
        created_at: { type: string, format: date-time }
        apiKey:
          type: string
          description: Provider API key (admin-only; sensitive).
        variants:
          type: array
          items:
            $ref: "#/components/schemas/AiVariantAdmin"

    AiGroupListAdminResponse:
      type: object
      required: [groups]
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/AiGroupAdmin"

    AiGroupWrapResponse:
      type: object
      required: [group]
      properties:
        group:
          type: object
          description: Group without nested variants in create/patch response
          required: [id, slug, label, role, color, free, position, created_at]
          properties:
            id: { type: integer, format: int64 }
            slug: { type: string }
            label: { type: string }
            role: { type: string }
            color: { type: string }
            free: { type: boolean }
            position: { type: integer }
            created_at: { type: string, format: date-time }
            apiKey:
              type: string
              description: Provider API key (admin-only; sensitive).

    AiVariantWrapResponse:
      type: object
      required: [variant]
      properties:
        variant:
          $ref: "#/components/schemas/AiVariantAdmin"

    AiReorderRequest:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items: { type: integer, format: int64 }

    AiGroupCreateRequest:
      type: object
      required: [slug, label]
      properties:
        slug: { type: string }
        label: { type: string }
        role: { type: string }
        color: { type: string }
        free: { type: boolean }
        position: { type: integer }
        apiKey: { type: string }

    AiGroupPatchRequest:
      type: object
      properties:
        slug: { type: string }
        label: { type: string }
        role: { type: string }
        color: { type: string }
        free: { type: boolean }
        position: { type: integer }
        apiKey: { type: string }

    AiVariantCreateRequest:
      type: object
      required: [slug]
      properties:
        slug: { type: string }
        label: { type: string }
        is_default: { type: boolean }
        position: { type: integer }

    AiVariantPatchRequest:
      type: object
      properties:
        slug: { type: string }
        label: { type: string }
        is_default: { type: boolean }
        position: { type: integer }
