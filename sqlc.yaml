version: "2"
sql:
  - engine: postgresql
    queries: internal/db/queries
    schema: internal/schema/schema.sql
    gen:
      go:
        package: dbgen
        out: internal/db/generated
        sql_package: pgx/v5
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: timestamptz
            go_type: time.Time
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: citext
            go_type: string
          - db_type: inet
            nullable: true
            go_type:
              import: net/netip
              type: Addr
              pointer: true
