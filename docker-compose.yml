services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-owlocal}
      POSTGRES_DB: ${POSTGRES_DB:-ow}
    ports:
      - "5432:5432"
    volumes:
      - ow_pgdata_pg18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ow} -d ${POSTGRES_DB:-ow}"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ow}:${POSTGRES_PASSWORD:-owlocal}@db:5432/${POSTGRES_DB:-ow}?sslmode=disable
      PORT: ${PORT:-8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,https://localhost,capacitor://localhost}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  ow_pgdata_pg18:
