services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 5s

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-owlocal}
      POSTGRES_DB: ${POSTGRES_DB:-ow}
    ports:
      - "5432:5432"
    volumes:
      - ow_pgdata_pg18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ow} -d ${POSTGRES_DB:-ow}"]
      interval: 3s
      timeout: 5s
      retries: 15
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgres://${POSTGRES_USER:-ow}:${POSTGRES_PASSWORD:-owlocal}@db:5432/${POSTGRES_DB:-ow}?sslmode=disable
      PORT: ${PORT:-8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173,https://localhost,capacitor://localhost}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REGISTRATION_OTP_TTL_SECONDS: ${REGISTRATION_OTP_TTL_SECONDS:-600}
      REGISTRATION_SETUP_TTL_SECONDS: ${REGISTRATION_SETUP_TTL_SECONDS:-900}
      PASSWORD_RESET_TTL_SECONDS: ${PASSWORD_RESET_TTL_SECONDS:-3600}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-Old Whale <no-reply@oldwhale.local>}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  ow_pgdata_pg18:
